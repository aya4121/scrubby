<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#E0F7FA"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#B2EBF2" opacity="0.5"/>
  <circle cx="1100" cy="530" r="120" fill="#B2EBF2" opacity="0.5"/>
  <circle cx="1050" cy="80" r="60" fill="#B2EBF2" opacity="0.4"/>
  <circle cx="150" cy="550" r="90" fill="#B2EBF2" opacity="0.4"/>

  <!-- Character (centered left) -->
  <g transform="translate(320, 115) scale(1.8)">
    <!-- Body -->
    <ellipse cx="100" cy="130" rx="45" ry="50" fill="#FFCC80"/>
    <!-- Head -->
    <circle cx="100" cy="75" r="38" fill="#FFCC80"/>
    <!-- Eyes -->
    <circle cx="87" cy="70" r="6" fill="#333"/>
    <circle cx="113" cy="70" r="6" fill="#333"/>
    <circle cx="89" cy="68" r="2" fill="white"/>
    <circle cx="115" cy="68" r="2" fill="white"/>
    <!-- Smile -->
    <path d="M88 85 Q100 95 112 85" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Arms -->
    <ellipse cx="58" cy="125" rx="12" ry="28" fill="#FFCC80" transform="rotate(-15 58 125)"/>
    <ellipse cx="142" cy="125" rx="12" ry="28" fill="#FFCC80" transform="rotate(15 142 125)"/>
    <!-- Legs -->
    <ellipse cx="85" cy="178" rx="14" ry="18" fill="#FFCC80"/>
    <ellipse cx="115" cy="178" rx="14" ry="18" fill="#FFCC80"/>
    <!-- Sparkles -->
    <text x="20" y="50" font-size="22">✨</text>
    <text x="155" y="45" font-size="16">✨</text>
    <text x="160" y="165" font-size="14">⭐</text>
  </g>

  <!-- App name -->
  <text x="680" y="240" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="#006064" text-anchor="middle">scrubby</text>

  <!-- Tagline -->
  <text x="680" y="320" font-family="Arial, sans-serif" font-size="36" fill="#00838F" text-anchor="middle">your shower buddy 🚿</text>

  <!-- Sub text -->
  <text x="680" y="400" font-family="Arial, sans-serif" font-size="28" fill="#006064" opacity="0.7" text-anchor="middle">skip a shower. watch the chaos.</text>

  <!-- URL -->
  <text x="680" y="530" font-family="Arial, sans-serif" font-size="24" fill="#006064" opacity="0.5" text-anchor="middle">scrubby-ten.vercel.app</text>
</svg>
